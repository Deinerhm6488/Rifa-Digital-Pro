<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Digital Profesional</title>
    <style>
        body { margin: 0; padding: 20px; background: #0a1912; display: flex; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #rifa-root {
            --bg: #0F2E22; --bg-panel: #14392A; --gold: #D4A72C; --gold-soft: #E8C766; 
            --cream: #F3ECD9; --cream-dim: #C9C2AC; --amber: #D99A34; --green-sold: #2E7D53;
            --line: rgba(243,236,217,0.18);
            background: var(--bg); color: var(--cream); border-radius: 14px;
            width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
        }
        .header { padding: 25px; border-bottom: 1px solid var(--line); text-align: center; }
        .title { font-size: 28px; color: var(--gold-soft); margin: 0; }
        .stats { display: flex; border-bottom: 1px solid var(--line); }
        .stat { flex: 1; padding: 15px; text-align: center; border-right: 1px solid var(--line); }
        .stat:last-child { border-right: none; }
        .stat-num { font-size: 18px; font-weight: bold; }
        .board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; padding: 20px; }
        .num { aspect-ratio: 1; border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .num.apartado { background: var(--amber); }
        .num.vendido { background: var(--green-sold); }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--gold); color: #000; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-panel); padding: 20px; border-radius: 10px; width: 90%; max-width: 300px; }
        input { width: 100%; padding: 8px; margin: 10px 0; border-radius: 4px; border: 1px solid var(--line); background: var(--bg); color: #fff; }
    </style>
</head>
<body>

<div id="rifa-root">
    <div class="header">
        <h1 class="title" id="titulo">Cargando...</h1>
    </div>
    <div class="stats">
        <div class="stat"> <div class="stat-num" id="stat-disp">0</div>Libres </div>
        <div class="stat"> <div class="stat-num" id="stat-vend">0</div>Vendidos </div>
    </div>
    <div class="board" id="board"></div>
    <div style="padding: 20px; text-align: center;">
        <button class="btn btn-primary" id="btn-admin">Administrar</button>
    </div>
    
    <div id="admin-panel" style="display:none; padding:20px; border-top:1px solid var(--line);">
        <input type="text" id="num-ganador" placeholder="Número ganador">
        <button class="btn" id="btn-sortear">Registrar Ganador</button>
        <button class="btn" id="btn-reset" style="background:#800;">Reiniciar</button>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/+esm';

    // --- CONFIGURACIÓN ---
    const supabaseUrl = 'https://gkbostzepzelzrgzsgrs.supabase.co'; 
    const supabaseKey = 'sb_publishable_hWt_cG8ic8kDMrAoHzV8AQ_JzZLSyOT';
    const supabase = createClient(supabaseUrl, supabaseKey);
    const NUM_WPP = "573217227461";

    let board = {};
    const $ = (id) => document.getElementById(id);

    async function init() {
        const { data } = await supabase.from('rifas').select('*').eq('id', 'sorteo_principal').single();
        if (data) {
            board = data.board;
            $('titulo').textContent = data.config.titulo;
            render();
        }
        supabase.channel('public:rifas').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rifas' }, p => { board = p.new.board; render(); }).subscribe();
    }

    function render() {
        $('board').innerHTML = '';
        let disp = 0, vend = 0;
        for(let i=0; i<100; i++) {
            let n = String(i).padStart(2, '0');
            let s = board[n]?.status || 'disponible';
            if(s === 'disponible') disp++; if(s === 'vendido') vend++;
            let div = document.createElement('div');
            div.className = `num ${s}`; div.textContent = n;
            div.onclick = () => openModal(n);
            $('board').appendChild(div);
        }
        $('stat-disp').textContent = disp; $('stat-vend').textContent = vend;
    }

    function openModal(n) {
        let b = board[n] || { status: 'disponible' };
        $('modal-body').innerHTML = `<h3>Número ${n}</h3>
            <input type="text" id="name" placeholder="Nombre">
            <input type="text" id="tel" placeholder="Teléfono">
            <button class="btn btn-primary" id="btn-save">Apartar</button>
            <button class="btn" onclick="$('modal').style.display='none'">Cerrar</button>`;
        $('modal').style.display = 'flex';
        $('btn-save').onclick = async () => {
            board[n] = { status: 'apartado', buyerName: $('name').value, buyerPhone: $('tel').value };
            await supabase.from('rifas').update({ board }).eq('id', 'sorteo_principal');
            window.open(`https://wa.me/${NUM_WPP}?text=Quiero el número ${n}. Soy ${$('name').value}`);
            $('modal').style.display = 'none';
        };
    }

    $('btn-admin').onclick = () => {
        let pin = prompt("PIN Admin");
        if(pin === "1234") $('admin-panel').style.display = 'block';
    };

    $('btn-reset').onclick = async () => {
        if(confirm("¿Borrar todo?")) {
            for(let i=0; i<100; i++) board[String(i).padStart(2,'0')] = { status: 'disponible' };
            await supabase.from('rifas').update({ board }).eq('id', 'sorteo_principal');
        }
    };

    init();
</script>
</body>
</html>
